name: zero_inspector_kit
description: A Flutter plugin for in-app developer console with network request viewing, logging, database inspection, and route tracking.
version: 1.0.0
homepage:

environment:
  sdk: '3.11.5'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: '2.1.8'
  http: '1.2.1'
  sqflite: '2.4.0'
  path_provider: '2.1.3'
  collection: '1.19.1'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: '6.0.0'

flutter:
  plugin:
    platforms:
      android:
        package: com.zerolabsco.zero_inspector_kit
        pluginClass: ZeroInspectorKitPlugin
      ios:
        pluginClass: ZeroInspectorKitPlugin