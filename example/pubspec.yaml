name: zero_inspector_kit_example
description: "Demonstrates how to use the zero_inspector_kit plugin."
publish_to: 'none'

environment:
  sdk: '3.11.5'

dependencies:
  flutter:
    sdk: flutter

  zero_inspector_kit:
    git:
      url: https://github.com/zero-labsco/zero_inspector_kit.git
      ref: 4e2af00

  dio: '5.4.3+1'
  http: '1.2.1'
  cupertino_icons: '1.0.8'
  logger: '2.4.0'
  sqflite: '2.4.0'
  path: '1.9.1'

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: '6.0.0'

flutter:
  uses-material-design: true